<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="piggyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#piggyGrad)"/>
  <!-- Piggy bank body -->
  <g transform="translate(256, 256)">
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="100" ry="80" fill="#FFFFFF" opacity="0.95"/>
    <!-- Head -->
    <ellipse cx="80" cy="-10" rx="60" ry="55" fill="#FFFFFF" opacity="0.95"/>
    <!-- Snout -->
    <ellipse cx="120" cy="5" rx="25" ry="18" fill="#F59E0B" opacity="0.8"/>
    <!-- Nostrils -->
    <circle cx="128" cy="2" r="4" fill="#92400E"/>
    <circle cx="112" cy="2" r="4" fill="#92400E"/>
    <!-- Eye -->
    <circle cx="95" cy="-20" r="10" fill="#1F2937"/>
    <circle cx="98" cy="-22" r="4" fill="#FFFFFF"/>
    <!-- Ear -->
    <path d="M60,-50 L70,-70 L80,-50 Z" fill="#FCD34D" opacity="0.8"/>
    <!-- Coin slot -->
    <rect x="-30" y="-45" width="30" height="10" rx="3" fill="#1F2937" opacity="0.6"/>
    <!-- Legs -->
    <rect x="-50" y="70" width="18" height="25" rx="5" fill="#F1F5F9"/>
    <rect x="-20" y="70" width="18" height="25" rx="5" fill="#F1F5F9"/>
    <rect x="30" y="70" width="18" height="25" rx="5" fill="#F1F5F9"/>
    <rect x="60" y="70" width="18" height="25" rx="5" fill="#F1F5F9"/>
    <!-- Tail -->
    <path d="M-90,10 C-110,0 -105,-30 -95,-25 C-85,-20 -90,0 -80,5" stroke="#10B981" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Coin indicator -->
    <text x="-10" y="8" font-size="32" font-weight="700" fill="#10B981" font-family="Arial, sans-serif">₦</text>
  </g>
</svg>