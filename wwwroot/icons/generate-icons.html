<!DOCTYPE html>
<html>
<head>
    <title>Generate Icons</title>
</head>
<body>
    <h1>Icon Generator</h1>
    <p>Upload an SVG or use the piggy bank design below</p>
    
    <canvas id="canvas" style="display:none;"></canvas>
    
    <div id="icons" style="display:flex;flex-wrap:wrap;gap:1rem;"></div>
    
    <script>
        // Piggy bank SVG as base64 (simplified for demo)
        // In production, generate these using a tool like https://www.pwabuilder.com/imageGenerator
        const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
        const container = document.getElementById('icons');
        
        sizes.forEach(size => {
            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.innerHTML = `
                <div style="width:${size}px;height:${size}px;background:#10B981;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto;">
                    <span style="font-size:${size/2}px;color:white;">🐷</span>
                </div>
                <span style="display:block;font-size:12px;margin-top:4px;">${size}x${size}</span>
            `;
            container.appendChild(div);
        });
    </script>
</body>
</html>
